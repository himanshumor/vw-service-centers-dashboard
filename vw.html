<meta charset="UTF-8" />

<title>VW India Service Centers Dashboard</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    flex-direction: row;
    height: 100vh;
    overflow: hidden;
  }

  #map {
    flex: 3;
    height: 100%;
  }

  #infoPanel {
    flex: 1;
    background-color: #f7f7f7;
    padding: 20px;
    border-left: 2px solid #ddd;
    box-shadow: -2px 0 6px rgba(0, 0, 0, 0.1);

  #infoPanel h2 {
    color: #004d99;
  }

  #infoPanel ul {
    padding-left: 20px;
  }

  .stat-box {
    background-color: #e6f2ff;
    border-left: 4px solid #004d99;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
  }

  #stateSelect {
    width: 90%;
    padding: 6px;
    margin-bottom: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-top: 10px;
  }

  table th, table td {
    padding: 6px;
    border: 1px solid #ccc;
  }

  table th {
    background-color: #004d99;
    color: white;
  }

  table tr:nth-child(even) {
    background-color: #e6f2ff;
  }

  table tr:nth-child(odd) {
    background-color: #ffffff;
  }
</style>
</head>

// --- Initialize Map ---
const map = L.map('map').setView([22.9734, 78.6569], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let stateLayer;
let markers = [];

// --- Add Dropdown States ---
const stateSelect = document.getElementById('stateSelect');
const uniqueStates = [...new Set(vwCenters.map(c => c.state))];
uniqueStates.forEach(s => {
  const opt = document.createElement('option');
  opt.value = s;
  opt.textContent = s;
  stateSelect.appendChild(opt);
});

// --- Add India State Boundaries ---
fetch("https://raw.githubusercontent.com/geohacker/india/master/state/india_telengana.geojson")
  .then(res => res.json())
  .then(geojsonData => {
    stateLayer = L.geoJson(geojsonData, {
      style: {
        color: "#555",
        weight: 1,
        fillColor: "#f2f2f2",
        fillOpacity: 0.5
      },
      onEachFeature: function (feature, layer) {
        const stateName = feature.properties.NAME_1;
        layer.on({
          click: () => onStateClick(stateName, layer)
        });
      }
    }).addTo(map);
  });

// --- Function: Handle State Click ---
function onStateClick(stateName, layer) {
  stateLayer.eachLayer(l => stateLayer.resetStyle(l));
  layer.setStyle({ color: "#004d99", weight: 3, fillColor: "#cce0ff", fillOpacity: 0.7 });
  const centers = vwCenters.filter(c => c.state === stateName);
  showMarkers(centers);
  map.fitBounds(layer.getBounds());
  updateInfoPanel(stateName, centers);
}

// --- Show Service Center Markers ---
function showMarkers(centers) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  centers.forEach(c => {
    const marker = L.marker([c.lat, c.lon])
      .bindPopup(`<b>${c.center}</b><br>${c.city}`)
      .addTo(map);
    markers.push(marker);
  });
}

// --- Update Info Panel (Colorful Table Format) ---
function updateInfoPanel(stateName, centers) {
  const infoDiv = document.getElementById("stateInfo");
  if (centers.length === 0) {
    infoDiv.innerHTML = `<h3>${stateName}</h3><p>No VW service centers available.</p>`;
    return;
  }

  const cities = [...new Set(centers.map(c => c.city))];

  infoDiv.innerHTML = `
    <h3>${stateName}</h3>
    <div class="stat-box"><b>Total Centers:</b> ${centers.length}</div>
    <div class="stat-box"><b>Cities Covered:</b> ${cities.length}</div>
    <h4>Service Centers</h4>
    <table>
      <thead>
        <tr><th>City</th><th>Center Name</th></tr>
      </thead>
      <tbody>
        ${centers.map(c => `
          <tr>
            <td>${c.city}</td>
            <td>${c.center}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// --- Handle Dropdown Selection ---
stateSelect.addEventListener("change", e => {
  const selected = e.target.value;
  if (selected === "all") {
    map.setView([22.9734, 78.6569], 5);
    markers.forEach(m => map.removeLayer(m));
    document.getElementById("stateInfo").innerHTML = `<p><i>Click a state on the map to see details.</i></p>`;
    return;
  }
  if (stateLayer) {
    stateLayer.eachLayer(l => {
      if (l.feature.properties.NAME_1 === selected) {
        onStateClick(selected, l);
      }
    });
  }
});
