<!DOCTYPE html>
<html>
<head>
<title>Kia Clavis Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0b1f2a;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:15px 20px;
  background:#0f2c3a;
  border-bottom:1px solid #1e4d60;
}

.header img{
  width:55px;
  border-radius:8px;
}

.title{
  font-size:22px;
  font-weight:600;
}

/* FILTER BAR */
.filters{
  display:flex;
  gap:10px;
  padding:15px 20px;
  flex-wrap:wrap;
}

select{
  padding:8px 12px;
  border-radius:20px;
  border:none;
  background:#1e4d60;
  color:white;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.kpi{
  background:#123848;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#123848;
  border-radius:10px;
  padding:15px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #1e4d60;
  text-align:left;
}

/* SERVICE DETAILS */
.details{
  padding:20px;
}
</style>
</head>

<body>

<div class="header">
  <img src="IMG_8873.jpeg">
  <div class="title">Kia Clavis Service Intelligence</div>
</div>

<div class="filters">
  <select id="engine"></select>
  <select id="gearbox"></select>
  <select id="variant"></select>
  <select id="year"></select>
</div>

<div class="kpi-grid">
  <div class="kpi" id="total"></div>
  <div class="kpi" id="avg"></div>
  <div class="kpi" id="max"></div>
  <div class="kpi" id="min"></div>
</div>

<div class="grid">
  <div class="card"><canvas id="line"></canvas></div>
  <div class="card"><canvas id="pie"></canvas></div>
</div>

<div class="grid">
  <div class="card"><canvas id="bar"></canvas></div>
  <div class="card details" id="details">Click a year to see service details</div>
</div>

<div class="card" style="margin:20px;">
  <table id="table"></table>
</div>

<script>

let rawData=[], charts={};

// CLEAN HEADER FUNCTION
function cleanKey(k){
  return k.replace(/\n/g,' ').replace(/\s+/g,' ').trim().toUpperCase();
}

// LOAD EXCEL
fetch("clavis.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{
  const wb = XLSX.read(data,{type:'array'});
  const sheet = wb.Sheets[wb.SheetNames[1]];
  const raw = XLSX.utils.sheet_to_json(sheet);

  rawData = raw.map(r=>{
    let obj={};
    Object.keys(r).forEach(k=>{
      obj[cleanKey(k)] = r[k];
    });

    return {
      engine: obj["ENGINE"],
      gearbox: obj["TRANSMISSION"],
      variant: obj["VARIANT"],
      year: parseInt(obj["INTERVAL"]),
      km: obj["INTERVAL"],
      cost: Number(obj["GRAND TOTAL"]||0),

      labour: Number(obj["LABOUR CHARGES"]||0),
      parts: Number(obj["SPARE PARTS CHARGES"]||0),
      cons: Number(obj["CONSUMABLE CHARGES"]||0),

      oil: obj["ENGINE OIL"],
      oilFilter: obj["ENGINE OIL FILTER"],
      airFilter: obj["AIR CLEANER FILTER"],
      fuelFilter: obj["FUEL FILTER"],
      coolant: obj["COOLANT (ENGINE)"],
      brake: obj["BRAKE / CLUTCH FLUID"]
    };
  }).filter(d=>d.year && d.cost);

  initFilters();
  update();
});

// FILTERS
function initFilters(){
  fill("engine","engine");
  fill("gearbox","gearbox");
  fill("variant","variant");
  fill("year","year");
}

function fill(id,key){
  let vals=[...new Set(rawData.map(d=>d[key]))];
  let el=document.getElementById(id);

  el.innerHTML=`<option value="all">All ${key}</option>`;
  vals.forEach(v=> el.innerHTML+=`<option>${v}</option>`);

  el.onchange=update;
}

// FILTER LOGIC
function getData(){
  return rawData.filter(d=>
    (engine.value==="all"||d.engine===engine.value)&&
    (gearbox.value==="all"||d.gearbox===gearbox.value)&&
    (variant.value==="all"||d.variant===variant.value)&&
    (year.value==="all"||d.year==year.value)
  );
}

// UPDATE DASHBOARD
function update(){

  let data=getData();

  let yearly={};
  data.forEach(d=>{
    yearly[d.year]=d;
  });

  data=Object.values(yearly).sort((a,b)=>a.year-b.year);

  let labels=data.map(d=>"Y"+d.year);
  let values=data.map(d=>d.cost);

  let total=values.reduce((a,b)=>a+b,0);
  let avg=Math.round(total/(values.length||1));
  let max=Math.max(...values);
  let min=Math.min(...values);

  total.innerHTML="Total ₹"+total;
  avg.innerHTML="Avg ₹"+avg;
  max.innerHTML="Max ₹"+max;
  min.innerHTML="Min ₹"+min;

  draw("line","line",labels,values);
  draw("bar","bar",labels,values);

  // PIE
  let labour=data.reduce((a,b)=>a+b.labour,0);
  let parts=data.reduce((a,b)=>a+b.parts,0);
  let cons=data.reduce((a,b)=>a+b.cons,0);

  if(charts.pie) charts.pie.destroy();
  charts.pie=new Chart(pie,{
    type:'pie',
    data:{
      labels:["Labour","Parts","Consumables"],
      datasets:[{data:[labour,parts,cons]}]
    }
  });

  // TABLE
  let html="<tr><th>Year</th><th>Cost</th></tr>";
  data.forEach(d=>{
    html+=`<tr onclick="showDetails(${d.year})">
    <td>${d.year}</td>
    <td>₹${d.cost}</td></tr>`;
  });
  table.innerHTML=html;
}

// CHART DRAW
function draw(id,type,labels,data){

  if(charts[id]) charts[id].destroy();

  charts[id]=new Chart(document.getElementById(id),{
    type,
    data:{labels,datasets:[{label:"Cost",data}]},
    options:{
      onClick:(e,el)=>{
        if(el.length){
          let index=el[0].index;
          showDetails(index+1);
        }
      }
    }
  });
}

// SERVICE DETAILS
function showDetails(year){

  let d=rawData.find(x=>x.year==year);
  if(!d) return;

  details.innerHTML=`
  <h3>Year ${year} Service</h3>
  <p><b>Cost:</b> ₹${d.cost}</p>
  <ul>
    <li>Engine Oil: ${d.oil||"-"}</li>
    <li>Oil Filter: ${d.oilFilter||"-"}</li>
    <li>Air Filter: ${d.airFilter||"-"}</li>
    <li>Fuel Filter: ${d.fuelFilter||"-"}</li>
    <li>Coolant: ${d.coolant||"-"}</li>
    <li>Brake Fluid: ${d.brake||"-"}</li>
  </ul>
  `;
}

</script>

</body>
</html>
