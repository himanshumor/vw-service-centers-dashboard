<!DOCTYPE html>
<html>
<head>
<title>Kia Carens Clavis Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#0b1c24;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#07161d;
  padding:20px;
  border-right:1px solid #123;
}

.sidebar h2 { margin-bottom:20px; }
.sidebar div {
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  cursor:pointer;
}
.sidebar div:hover { background:#123; }

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* KPI */
.kpi-row {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:10px;
}

.kpi {
  background:#132a35;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* CHART GRID */
.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:15px;
  margin-top:20px;
}

.card {
  background:#132a35;
  padding:15px;
  border-radius:12px;
}

/* TABLE */
table { width:100%; margin-top:10px; }
td,th { padding:6px; border-bottom:1px solid #333; }

/* RIGHT PANEL */
.insights {
  background:#132a35;
  padding:15px;
  border-radius:12px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🚗 Kia Dashboard</h2>

  <div>Overview</div>
  <div>Yearly Analysis</div>
  <div>Service Details</div>
  <div>Cost Breakdown</div>
</div>

<!-- MAIN -->
<div class="main">

<h2>Kia Carens Clavis Service Intelligence</h2>

<!-- KPI -->
<div class="kpi-row">
  <div class="kpi" id="total"></div>
  <div class="kpi" id="avg"></div>
  <div class="kpi" id="max"></div>
  <div class="kpi" id="min"></div>
  <div class="kpi" id="perkm"></div>
</div>

<!-- CHARTS -->
<div class="grid">
  <div class="card">
    <h3>Year-wise Cost</h3>
    <canvas id="line"></canvas>
  </div>

  <div class="card">
    <h3>Cost Breakdown</h3>
    <canvas id="pie"></canvas>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h3>Category Cost</h3>
    <canvas id="bar"></canvas>
  </div>

  <div class="insights" id="insights">
    <h3>Insights</h3>
    <p>Click a year to see service details</p>
  </div>
</div>

<!-- TABLE -->
<div class="card">
  <h3>Service Table</h3>
  <table id="table"></table>
</div>

</div>

<script>

let charts={};

fetch("clavis.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

const wb=XLSX.read(data,{type:"array"});
const sheet=wb.Sheets["Sheet2"];
const raw=XLSX.utils.sheet_to_json(sheet);

const clean=raw.map(r=>{

const keys=Object.keys(r);

const yearRaw = r[keys.find(k=>k.includes("INTERVAL") && r[k]?.includes("YEAR"))];
const kmRaw   = r[keys.find(k=>k.includes("INTERVAL") && r[k]?.includes("KMS"))];

return{
  year:parseInt(yearRaw),
  km:parseInt(kmRaw),

  cost:Number(r["GRAND TOTAL"]||0),
  labour:Number(r["LABOUR CHARGES"]||0),
  parts:Number(r["SPARE PARTS CHARGES"]||0),
  cons:Number(r["CONSUMABLE CHARGES"]||0),

  oil:Number(r["ENGINE OIL"]||0),
  oilFilter:Number(r["ENGINE OIL FILTER"]||0),
  coolant:Number(r["COOLANT (ENGINE)"]||0),
  brake:Number(r["BRAKE / CLUTCH FLUID"]||0)
};

}).filter(d=>d.year && d.cost);

// GROUP
const map={};
clean.forEach(d=>map[d.year]=d);

const dataArr=Object.values(map).sort((a,b)=>a.year-b.year);

// KPI
const total=dataArr.reduce((a,b)=>a+b.cost,0);

total.innerHTML="💰 ₹"+total;
avg.innerHTML="📊 ₹"+Math.round(total/10);
max.innerHTML="🚨 ₹"+Math.max(...dataArr.map(d=>d.cost));
min.innerHTML="📉 ₹"+Math.min(...dataArr.map(d=>d.cost));
perkm.innerHTML="₹"+(total/100000).toFixed(2)+"/km";

// LINE
charts.line=new Chart(line,{
type:'line',
data:{
labels:dataArr.map(d=>"Y"+d.year),
datasets:[{data:dataArr.map(d=>d.cost)}]
},
options:{
onClick:(e,el)=>{
if(el.length){
showDetails(dataArr[el[0].index]);
}
}
}
});

// PIE
charts.pie=new Chart(pie,{
type:'doughnut',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// BAR
charts.bar=new Chart(bar,{
type:'bar',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// TABLE
let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";
dataArr.forEach(d=>{
html+=`<tr>
<td>${d.year}</td>
<td>${d.km}</td>
<td>₹${d.cost}</td>
</tr>`;
});
table.innerHTML=html;

});

// DETAILS PANEL
function showDetails(d){
insights.innerHTML=`
<h3>🔧 Year ${d.year} (${d.km} KM)</h3>
<p>Engine Oil: ₹${d.oil}</p>
<p>Oil Filter: ₹${d.oilFilter}</p>
<p>Coolant: ₹${d.coolant}</p>
<p>Brake Fluid: ₹${d.brake}</p>
<p><b>Total: ₹${d.cost}</b></p>
`;
}

</script>

</body>
</html>
