<!DOCTYPE html>
<html>
<head>
<title>Kia Carens Clavis - Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#0b1c24;
  color:white;
  margin:0;
}

.container { padding:20px; }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.filters select {
  padding:8px;
  border-radius:8px;
  background:#123;
  color:white;
}

.kpi-grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  margin-top:20px;
}

.kpi {
  background:#16313d;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:20px;
  margin-top:20px;
}

.card {
  background:#132a35;
  padding:15px;
  border-radius:10px;
}

img {
  width:100%;
  border-radius:10px;
}

table {
  width:100%;
  margin-top:10px;
}

td, th {
  padding:8px;
  border-bottom:1px solid #333;
}

.highlight {
  background:#1f4d5e;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>🚙 Kia Carens Clavis Dashboard</h1>
</div>

<div class="filters">
  <select id="city"></select>
  <select id="engine"></select>
  <select id="variant"></select>
</div>

<div class="kpi-grid">
  <div class="kpi" id="total"></div>
  <div class="kpi" id="avg"></div>
  <div class="kpi" id="max"></div>
  <div class="kpi" id="perkm"></div>
</div>

<div class="grid">

  <div class="card">
    <canvas id="line"></canvas>
  </div>

  <div class="card">
    <h3>🚘 Car Overview</h3>
    <img src="car.png">
    <p>1.5 Diesel / Petrol Options</p>
    <p>Power: 117.5 kW | Torque: 253 Nm</p>
  </div>

</div>

<div class="grid">

  <div class="card">
    <canvas id="bar"></canvas>
  </div>

  <div class="card">
    <canvas id="pie"></canvas>
  </div>

</div>

<div class="grid">

  <div class="card">
    <h3>📅 Service Table</h3>
    <table id="table"></table>
  </div>

  <div class="card">
    <h3>🔧 Service Details</h3>
    <div id="details"></div>
  </div>

</div>

<div class="card">
  <h3>💡 Insights</h3>
  <div id="insights"></div>
</div>

</div>

<script>

let rawData=[], charts={}, selectedYear=null;

fetch("clavis.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{
  const wb=XLSX.read(data,{type:"array"});
  const sheet=wb.Sheets["Sheet2"];
  const raw=XLSX.utils.sheet_to_json(sheet);

  rawData = raw.map(r=>({
    city:r["CITY"],
    engine:r["ENGINE"],
    variant:(r["   VARIANT"]||"").trim(),
    year:parseInt(r["   INTERVAL"]),
    km:r["INTERVAL"],
    cost:r["GRAND TOTAL"]||0,
    labour:r["LABOUR \nCHARGES"]||0,
    parts:r["SPARE PARTS \nCHARGES"]||0,
    consumables:r["CONSUMABLE \nCHARGES"]||0
  })).filter(d=>d.year);

  initFilters();
  update();
});

function initFilters(){
  fill("city","city");
  fill("engine","engine");
  fill("variant","variant");
}

function fill(id,key){
  const vals=[...new Set(rawData.map(d=>d[key]).filter(Boolean))];
  const el=document.getElementById(id);
  el.innerHTML=`<option value="all">All ${key}</option>`;
  vals.forEach(v=>el.innerHTML+=`<option>${v}</option>`);
  el.onchange=update;
}

function getFiltered(){
  return rawData.filter(d=>
    (city.value==="all"||d.city===city.value)&&
    (engine.value==="all"||d.engine===engine.value)&&
    (variant.value==="all"||d.variant===variant.value)
  );
}

function update(){

  let data=getFiltered();
  data=data.sort((a,b)=>a.year-b.year);

  const labels=data.map(d=>"Y"+d.year);
  const values=data.map(d=>d.cost);

  const total=values.reduce((a,b)=>a+b,0);
  const avg=Math.round(total/(values.length||1));
  const max=Math.max(...values);

  total.innerHTML=`💰 ₹${total}`;
  avg.innerHTML=`📊 ₹${avg}`;
  max.innerHTML=`🚨 ₹${max}`;
  perkm.innerHTML=`₹ ${(total/100000).toFixed(2)}/km`;

  drawChart("line","line",labels,values);
  drawChart("bar","bar",labels,values);

  const labour=data.reduce((a,b)=>a+b.labour,0);
  const parts=data.reduce((a,b)=>a+b.parts,0);
  const cons=data.reduce((a,b)=>a+b.consumables,0);

  if(charts.pie) charts.pie.destroy();
  charts.pie=new Chart(pie,{
    type:"pie",
    data:{
      labels:["Labour","Parts","Consumables"],
      datasets:[{data:[labour,parts,cons]}]
    }
  });

  // table
  let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";
  data.forEach(d=>{
    html+=`<tr onclick="selectYear(${d.year})" class="${selectedYear==d.year?'highlight':''}">
      <td>${d.year}</td>
      <td>${d.km}</td>
      <td>₹${d.cost}</td>
    </tr>`;
  });
  table.innerHTML=html;

  generateInsights(data);
}

function drawChart(id,type,labels,data){

  if(charts[id]) charts[id].destroy();

  charts[id]=new Chart(document.getElementById(id),{
    type,
    data:{
      labels,
      datasets:[{data}]
    },
    options:{
      onClick:(e,el)=>{
        if(el.length){
          const i=el[0].index;
          selectYear(i+1);
        }
      }
    }
  });
}

function selectYear(y){
  selectedYear=y;

  const d=rawData.find(x=>x.year==y);
  if(!d) return;

  const details=[
    {name:"Engine Oil", cost:1200},
    {name:"Oil Filter", cost:400},
    {name:"Air Filter", cost:600},
    {name:"Fuel Filter", cost:1200},
    {name:"Cabin Filter", cost:500},
    {name:"Brake Fluid", cost:300},
    {name:"Coolant", cost:400}
  ];

  details.innerHTML=details.map(x=>`
    <p>✔ ${x.name} - ₹${x.cost}</p>
  `).join("");
}

function generateInsights(data){
  const maxYear=data.reduce((a,b)=>a.cost>b.cost?a:b);

  insights.innerHTML=`
    <p>🔴 Highest cost in Year ${maxYear.year}</p>
    <p>🟢 Maintain regularly to reduce spikes</p>
    <p>⚙️ Engine oil & filters drive most costs</p>
  `;
}

</script>

</body>
</html>
