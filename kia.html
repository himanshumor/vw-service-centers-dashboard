<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kia Carens Clavis Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI";
  background: #0f2027;
  color: white;
}

.container {
  padding: 20px;
}

h1 {
  text-align: center;
}

.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

.card {
  background: #1e3c47;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #555;
}

th {
  background: #2c5364;
}

button {
  margin-bottom: 20px;
  padding: 10px;
  border: none;
  background: #00c6ff;
  color: black;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<button onclick="goHome()">⬅ Home</button>

<h1>🚙 Kia Carens Clavis Interactive Dashboard</h1>

<!-- Filters -->
<div class="filters">
  <select id="cityFilter"></select>
  <select id="engineFilter"></select>
  <select id="variantFilter"></select>
</div>

<!-- Chart -->
<div class="card">
  <h3>📊 Service Cost Trend</h3>
  <canvas id="costChart"></canvas>
</div>

<!-- Table -->
<div class="card">
  <h3>📋 Service Breakdown</h3>
  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>KMs</th>
        <th>Total Cost</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</div>

<script>

// Sample extracted dataset (expand later if needed)
const data = [
  {city:"DELHI", engine:"1.5 DIESEL", variant:"HTK Plus 7", year:"1 Year", km:"10K", total:2112},
  {city:"DELHI", engine:"1.5 DIESEL", variant:"HTK Plus 7", year:"2 Year", km:"20K", total:2727},
  {city:"DELHI", engine:"1.5 DIESEL", variant:"HTK Plus 7", year:"3 Year", km:"30K", total:3815}
];

// Populate filters
function populateFilters() {
  const cities = [...new Set(data.map(d => d.city))];
  const engines = [...new Set(data.map(d => d.engine))];
  const variants = [...new Set(data.map(d => d.variant))];

  fillSelect("cityFilter", cities);
  fillSelect("engineFilter", engines);
  fillSelect("variantFilter", variants);
}

function fillSelect(id, values) {
  const el = document.getElementById(id);
  el.innerHTML = `<option value="all">All ${id}</option>`;
  values.forEach(v => {
    el.innerHTML += `<option value="${v}">${v}</option>`;
  });
}

// Filter logic
function getFilteredData() {
  const city = document.getElementById("cityFilter").value;
  const engine = document.getElementById("engineFilter").value;
  const variant = document.getElementById("variantFilter").value;

  return data.filter(d =>
    (city === "all" || d.city === city) &&
    (engine === "all" || d.engine === engine) &&
    (variant === "all" || d.variant === variant)
  );
}

// Update table
function updateTable(filtered) {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  filtered.forEach(d => {
    body.innerHTML += `
      <tr>
        <td>${d.year}</td>
        <td>${d.km}</td>
        <td>₹${d.total}</td>
      </tr>
    `;
  });
}

// Chart
let chart;

function updateChart(filtered) {
  const labels = filtered.map(d => d.year);
  const values = filtered.map(d => d.total);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("costChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Service Cost (₹)',
        data: values,
        borderWidth: 2
      }]
    }
  });
}

// Main update
function updateDashboard() {
  const filtered = getFilteredData();
  updateTable(filtered);
  updateChart(filtered);
}

// Events
["cityFilter","engineFilter","variantFilter"].forEach(id => {
  document.getElementById(id).addEventListener("change", updateDashboard);
});

// Init
populateFilters();
updateDashboard();

// Navigation
function goHome() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
