<!DOCTYPE html>
<html>
<head>
<title>Kia Carens Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#0f2027; color:white; margin:0; }
.container { padding:20px; }

.filters { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }

.card { background:#1e3c47; padding:15px; border-radius:10px; margin:10px 0; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:15px;
}

.kpi {
  background:#2c5364;
  padding:15px;
  border-radius:8px;
  text-align:center;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<button onclick="goHome()">⬅ Home</button>

<h1>🚙 Kia Carens Clavis Analytics</h1>

<div class="filters">
  <select id="city"></select>
  <select id="engine"></select>
  <select id="variant"></select>
  <button onclick="resetYear()">Reset Year Filter</button>
</div>

<div class="grid">
  <div class="kpi" id="total"></div>
  <div class="kpi" id="avg"></div>
  <div class="kpi" id="max"></div>
</div>

<div class="grid">
  <div class="card"><canvas id="line"></canvas></div>
  <div class="card"><canvas id="bar"></canvas></div>
  <div class="card"><canvas id="pie"></canvas></div>
</div>

<div class="card" id="breakdown">
  <h3>📊 Click a year in chart to see breakdown</h3>
</div>

<div class="card">
<table id="table"></table>
</div>

</div>

<script>

let rawData = [];
let charts = {};
let selectedYear = null;

// DOM
const cityEl = document.getElementById("city");
const engineEl = document.getElementById("engine");
const variantEl = document.getElementById("variant");

const totalDiv = document.getElementById("total");
const avgDiv = document.getElementById("avg");
const maxDiv = document.getElementById("max");

// LOAD EXCEL
fetch("clavis.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

  const wb = XLSX.read(data, {type:"array"});
  const sheet = wb.Sheets[wb.SheetNames[1]];

  let raw = XLSX.utils.sheet_to_json(sheet);

  rawData = raw.map(r => {
    const keys = Object.keys(r);
    const find = k => keys.find(x => x.toUpperCase().includes(k));

    return {
      city: r[find("CITY")],
      engine: r[find("ENGINE")],
      variant: (r[find("VARIANT")] || "").trim(),
      year: parseInt(r[find("INTERVAL")]),
      km: r[find("KMS")] || r[find("INTERVAL")],
      cost: r[find("TOTAL")] || 0,
      labour: r[find("LABOUR")] || 0,
      parts: r[find("SPARE")] || 0,
      consumables: r[find("CONSUMABLE")] || 0
    };
  }).filter(d => d.year && d.cost);

  initFilters();
  update();
});

// FILTER INIT
function initFilters(){
  fill(cityEl,"city");
  fill(engineEl,"engine");
  fill(variantEl,"variant");
}

function fill(el,key){
  const vals=[...new Set(rawData.map(d=>d[key]).filter(Boolean))];
  el.innerHTML=`<option value="all">All ${key}</option>`;
  vals.forEach(v=> el.innerHTML+=`<option>${v}</option>`);
  el.onchange=update;
}

// FILTER DATA
function getFiltered(){
  return rawData.filter(d =>
    (cityEl.value==="all"||d.city===cityEl.value) &&
    (engineEl.value==="all"||d.engine===engineEl.value) &&
    (variantEl.value==="all"||d.variant===variantEl.value)
  );
}

// MAIN UPDATE
function update(){

  let data = getFiltered();

  if(selectedYear){
    data = data.filter(d => d.year === selectedYear);
  }

  // remove duplicates
  const unique = {};
  data.forEach(d => unique[d.year] = d);
  data = Object.values(unique).sort((a,b)=>a.year-b.year);

  const labels = data.map(d=>"Y"+d.year);
  const values = data.map(d=>d.cost);

  // KPI
  const total = values.reduce((a,b)=>a+b,0);
  const avg = Math.round(total/(values.length||1));
  const max = Math.max(...values,0);

  totalDiv.innerHTML=`💰 Total ₹${total}`;
  avgDiv.innerHTML=`📊 Avg ₹${avg}`;
  maxDiv.innerHTML=`🚨 Max ₹${max}`;

  draw("line","line",labels,values);
  draw("bar","bar",labels,values);

  // PIE
  const labour = data.reduce((a,b)=>a+b.labour,0);
  const parts = data.reduce((a,b)=>a+b.parts,0);
  const cons = data.reduce((a,b)=>a+b.consumables,0);

  if(charts.pie) charts.pie.destroy();
  charts.pie = new Chart(document.getElementById("pie"), {
    type:'pie',
    data:{
      labels:["Labour","Parts","Consumables"],
      datasets:[{data:[labour,parts,cons]}]
    }
  });

  // TABLE
  let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";
  data.forEach(d=>{
    html+=`<tr>
      <td>${d.year}</td>
      <td>${d.km}</td>
      <td>₹${d.cost}</td>
    </tr>`;
  });
  document.getElementById("table").innerHTML=html;

  // BREAKDOWN
  const breakdownDiv = document.getElementById("breakdown");

  if(data.length === 1){
    const d = data[0];

    breakdownDiv.innerHTML = `
      <h3>🔍 Year ${d.year} Service Breakdown</h3>
      <p>💰 Total: ₹${d.cost}</p>
      <p>🛠 Labour: ₹${d.labour}</p>
      <p>🔩 Parts: ₹${d.parts}</p>
      <p>🧴 Consumables: ₹${d.consumables}</p>
    `;
  } else {
    breakdownDiv.innerHTML = `
      <h3>📊 Click a year in chart to see breakdown</h3>
    `;
  }
}

// CHART WITH CLICK
function draw(id,type,labels,data){

  if(charts[id]) charts[id].destroy();

  charts[id] = new Chart(document.getElementById(id),{
    type,
    data:{labels,datasets:[{label:"₹",data}]},
    options:{
      onClick: (evt, elements) => {
        if(elements.length > 0){
          const index = elements[0].index;
          selectedYear = index + 1;
          update();
        }
      }
    }
  });
}

// RESET
function resetYear(){
  selectedYear = null;
  update();
}

// NAV
function goHome(){
  location.href="index.html";
}

</script>

</body>
</html>
