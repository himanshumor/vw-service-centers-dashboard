<!DOCTYPE html>
<html>
<head>
<title>Kia Carens Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#0f2027; color:white; margin:0; }
.container { padding:20px; }

.filters { display:flex; gap:10px; margin-bottom:20px; }

.card { background:#1e3c47; padding:15px; border-radius:10px; margin:10px 0; }

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:15px;
}

.kpi {
  background:#2c5364;
  padding:15px;
  border-radius:8px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<button onclick="goHome()">⬅ Home</button>

<h1>🚙 Kia Carens Clavis Analytics</h1>

<div class="filters">
  <select id="city"></select>
  <select id="engine"></select>
  <select id="variant"></select>
</div>

<div class="grid">
  <div class="kpi" id="total"></div>
  <div class="kpi" id="avg"></div>
  <div class="kpi" id="max"></div>
</div>

<div class="grid">
  <div class="card"><canvas id="line"></canvas></div>
  <div class="card"><canvas id="bar"></canvas></div>
  <div class="card"><canvas id="pie"></canvas></div>
</div>

<div class="card">
<table id="table"></table>
</div>

</div>

<script>

let rawData = [];
let charts = {};

// LOAD EXCEL
fetch("clavis.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

  const wb = XLSX.read(data, {type:"array"});
  const sheet = wb.Sheets["Sheet2"];
  let raw = XLSX.utils.sheet_to_json(sheet);

  // ✅ CLEAN DATA PROPERLY
  rawData = raw.map(r => ({
    city: r["CITY"],
    engine: r["ENGINE"],
    variant: (r["   VARIANT"] || "").trim(),

    year: parseInt(r["   INTERVAL"]),   // ✅ FIXED
    km: r["INTERVAL"],                  // ✅ FIXED

    cost: r["GRAND TOTAL"] || 0,
    labour: r["LABOUR \nCHARGES"] || 0,
    parts: r["SPARE PARTS \nCHARGES"] || 0,
    consumables: r["CONSUMABLE \nCHARGES"] || 0
  }))
  .filter(d => d.year && d.cost); // remove junk rows

  initFilters();
  update();
});

// FILTERS
function initFilters(){
  fill("city","city");
  fill("engine","engine");
  fill("variant","variant");
}

function fill(id,key){
  const vals=[...new Set(rawData.map(d=>d[key]).filter(Boolean))];
  const el=document.getElementById(id);

  el.innerHTML=`<option value="all">All ${key}</option>`;
  vals.forEach(v=> el.innerHTML+=`<option>${v}</option>`);

  el.onchange=update;
}

// FILTER LOGIC
function getFiltered(){
  const c=city.value, e=engine.value, v=variant.value;

  return rawData.filter(d =>
    (c==="all"||d.city===c) &&
    (e==="all"||d.engine===e) &&
    (v==="all"||d.variant===v)
  );
}

// MAIN UPDATE
function update(){

  let data=getFiltered();

  // ✅ REMOVE DUPLICATES (important)
  const unique = {};
  data.forEach(d=>{
    unique[d.year] = d;
  });

  data = Object.values(unique).sort((a,b)=>a.year-b.year);

  const labels = data.map(d=>"Y"+d.year);
  const values = data.map(d=>d.cost);

  // KPI
  const total = values.reduce((a,b)=>a+b,0);
  const avg = Math.round(total/(values.length||1));
  const max = Math.max(...values,0);

  totalDiv.innerHTML=`💰 Total ₹${total}`;
  avgDiv.innerHTML=`📊 Avg ₹${avg}`;
  maxDiv.innerHTML=`🚨 Max ₹${max}`;

  // LINE
  draw("line","line",labels,values);

  // BAR
  draw("bar","bar",labels,values);

  // PIE
  const labour = data.reduce((a,b)=>a+b.labour,0);
  const parts = data.reduce((a,b)=>a+b.parts,0);
  const cons = data.reduce((a,b)=>a+b.consumables,0);

  if(charts.pie) charts.pie.destroy();
  charts.pie = new Chart(pie, {
    type:'pie',
    data:{
      labels:["Labour","Parts","Consumables"],
      datasets:[{data:[labour,parts,cons]}]
    }
  });

  // TABLE
  let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";

  data.forEach(d=>{
    html+=`<tr>
      <td>${d.year}</td>
      <td>${d.km}</td>
      <td>₹${d.cost}</td>
    </tr>`;
  });

  table.innerHTML=html;
}

// CHART HELPER
function draw(id,type,labels,data){
  if(charts[id]) charts[id].destroy();

  charts[id] = new Chart(document.getElementById(id),{
    type,
    data:{labels, datasets:[{label:"₹", data}]}
  });
}

// NAV
function goHome(){
  location.href="index.html";
}

</script>

</body>
</html>
