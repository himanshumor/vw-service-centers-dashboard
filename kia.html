<!DOCTYPE html>
<html>
<head>
<title>Kia Clavis Premium Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#07151c,#0b2a36);
color:#fff;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:#061219;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar img{
width:100%;
border-radius:12px;
object-fit:cover;
}

.sidebar h2{
margin:10px 0 0;
font-size:20px;
}

.sidebar p{
opacity:.7;
margin:2px 0;
font-size:14px;
}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* KPI */
.kpi-row{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-bottom:20px;
}

.kpi{
background:#132a35;
padding:14px;
border-radius:12px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.kpi small{
display:block;
opacity:.6;
font-size:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:16px;
margin-bottom:16px;
}

.card{
background:#132a35;
padding:16px;
border-radius:14px;
box-shadow:0 0 12px rgba(0,0,0,0.25);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:left;
border-bottom:1px solid #333;
}

/* INSIGHTS */
.insight{
background:#1b3a46;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<img src="https://imgd.aeplcdn.com/600x337/n/cw/ec/131825/carens-exterior-right-front-three-quarter-2.jpeg">

<h2>Kia Carens Clavis</h2>
<p>1.5 Diesel • Manual</p>
<p>7 Seater • 10 Years</p>

</div>

<!-- MAIN -->
<div class="main">

<h2>Service Cost Intelligence</h2>

<!-- KPI -->
<div class="kpi-row">
<div class="kpi" id="total"><small>Total Cost</small></div>
<div class="kpi" id="avg"><small>Avg Cost</small></div>
<div class="kpi" id="max"><small>Max Cost</small></div>
<div class="kpi" id="min"><small>Min Cost</small></div>
<div class="kpi" id="perkm"><small>Cost/km</small></div>
</div>

<!-- ROW 1 -->
<div class="grid">

<div class="card">
<h3>Year-wise Cost</h3>
<canvas id="line"></canvas>
</div>

<div class="card">
<h3>Cost Breakdown</h3>
<canvas id="pie"></canvas>
</div>

</div>

<!-- ROW 2 -->
<div class="grid">

<div class="card">
<h3>Category Cost</h3>
<canvas id="bar"></canvas>
</div>

<div class="card">
<h3>Insights</h3>
<div id="insights">Click a year in chart</div>
</div>

</div>

<!-- TABLE -->
<div class="card">
<h3>Service Table</h3>
<table id="table"></table>
</div>

</div>

<script>

let charts={};

fetch("clavis.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

const wb=XLSX.read(data,{type:"array"});
const sheet=wb.Sheets["Sheet2"];
const raw=XLSX.utils.sheet_to_json(sheet);

// 🔥 CLEAN PARSE (robust)
const dataArr = raw.map(r=>{

const keys=Object.keys(r);

const yearKey = keys.find(k=>k.includes("YEAR"));
const kmKey   = keys.find(k=>k.includes("KMS"));

return{
year:parseInt(r[yearKey]),
km:parseInt(r[kmKey]),
cost:Number(r["GRAND TOTAL"]||0),
labour:Number(r["LABOUR CHARGES"]||0),
parts:Number(r["SPARE PARTS CHARGES"]||0),
cons:Number(r["CONSUMABLE CHARGES"]||0),
oil:Number(r["ENGINE OIL"]||0),
filter:Number(r["ENGINE OIL FILTER"]||0),
coolant:Number(r["COOLANT (ENGINE)"]||0),
brake:Number(r["BRAKE / CLUTCH FLUID"]||0)
};

}).filter(d=>d.year && d.cost);

// GROUP UNIQUE YEARS
const map={};
dataArr.forEach(d=>map[d.year]=d);
const finalData=Object.values(map).sort((a,b)=>a.year-b.year);

// KPI
const total = finalData.reduce((a,b)=>a+b.cost,0);
document.getElementById("total").innerHTML+=`₹ ${total}`;
document.getElementById("avg").innerHTML+=`₹ ${Math.round(total/10)}`;
document.getElementById("max").innerHTML+=`₹ ${Math.max(...finalData.map(d=>d.cost))}`;
document.getElementById("min").innerHTML+=`₹ ${Math.min(...finalData.map(d=>d.cost))}`;
document.getElementById("perkm").innerHTML+=`₹ ${(total/100000).toFixed(2)}`;

// LINE
charts.line=new Chart(line,{
type:'line',
data:{
labels:finalData.map(d=>"Y"+d.year),
datasets:[{
data:finalData.map(d=>d.cost),
borderColor:"#00c6ff",
tension:.4
}]
},
options:{
onClick:(e,el)=>{
if(el.length){
const d=finalData[el[0].index];
showDetails(d);
}
}
}
});

// PIE
charts.pie=new Chart(pie,{
type:'doughnut',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
finalData.reduce((a,b)=>a+b.parts,0),
finalData.reduce((a,b)=>a+b.labour,0),
finalData.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// BAR
charts.bar=new Chart(bar,{
type:'bar',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
finalData.reduce((a,b)=>a+b.parts,0),
finalData.reduce((a,b)=>a+b.labour,0),
finalData.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// TABLE
let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";
finalData.forEach(d=>{
html+=`<tr><td>${d.year}</td><td>${d.km}</td><td>₹${d.cost}</td></tr>`;
});
table.innerHTML=html;

});

// DETAILS PANEL
function showDetails(d){
document.getElementById("insights").innerHTML=`
<div class="insight">🛢 Oil: ₹${d.oil}</div>
<div class="insight">🔧 Filter: ₹${d.filter}</div>
<div class="insight">❄ Coolant: ₹${d.coolant}</div>
<div class="insight">🛑 Brake Fluid: ₹${d.brake}</div>
<div class="insight"><b>Total: ₹${d.cost}</b></div>
`;
}

</script>

</body>
</html>
