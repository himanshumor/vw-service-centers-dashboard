<!DOCTYPE html>
<html>
<head>
<title>Kia Dashboard FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { background:#0b1c24; color:white; font-family:Arial; }
.container { padding:20px; }

.kpi-grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
}

.kpi { background:#16313d; padding:10px; border-radius:8px; }

.card { background:#132a35; padding:10px; margin-top:15px; border-radius:10px; }

img { width:100%; border-radius:10px; }
</style>
</head>

<body>

<div class="container">

<h2>🚙 Kia Dashboard</h2>

<div class="kpi-grid">
  <div class="kpi" id="total"></div>
  <div class="kpi" id="avg"></div>
  <div class="kpi" id="max"></div>
  <div class="kpi" id="perkm"></div>
</div>

<div class="card">
  <canvas id="line"></canvas>
</div>

<div class="card">
  <canvas id="bar"></canvas>
</div>

<div class="card">
  <canvas id="pie"></canvas>
</div>

<div class="card">
  <h3>🚘 Car</h3>
  <!-- ✅ WORKING IMAGE -->
  <img src="https://kia.com/content/dam/kia2/in/en/images/vehicles/carens-clavis/exterior.jpg">
</div>

</div>

<script>

let charts={};

fetch("clavis.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

  const wb=XLSX.read(data,{type:"array"});

  // ✅ AUTO DETECT SHEET
  const sheetName = wb.SheetNames[0];
  const sheet = wb.Sheets[sheetName];

  const raw = XLSX.utils.sheet_to_json(sheet);

  console.log("RAW DATA:", raw);

  const clean = raw.map(r=>({

    year: parseInt(r["INTERVAL"] || r["   INTERVAL"]),
    cost: Number(r["GRAND TOTAL"] || 0),
    labour: Number(r["LABOUR \nCHARGES"] || 0),
    parts: Number(r["SPARE PARTS \nCHARGES"] || 0),
    cons: Number(r["CONSUMABLE \nCHARGES"] || 0)

  })).filter(d=>d.year && d.cost);

  console.log("CLEAN DATA:", clean);

  if(clean.length === 0){
    alert("⚠️ Data not parsed. Check column names.");
    return;
  }

  const labels = clean.map(d=>"Y"+d.year);
  const values = clean.map(d=>d.cost);

  // ✅ FIX DOM
  document.getElementById("total").innerHTML = "₹ "+values.reduce((a,b)=>a+b,0);
  document.getElementById("avg").innerHTML = "₹ "+Math.round(values.reduce((a,b)=>a+b,0)/values.length);
  document.getElementById("max").innerHTML = "₹ "+Math.max(...values);
  document.getElementById("perkm").innerHTML = "₹ "+(values.reduce((a,b)=>a+b,0)/100000).toFixed(2)+"/km";

  // LINE
  charts.line = new Chart(document.getElementById("line"),{
    type:"line",
    data:{ labels, datasets:[{label:"Cost", data:values}] }
  });

  // BAR
  charts.bar = new Chart(document.getElementById("bar"),{
    type:"bar",
    data:{ labels, datasets:[{data:values}] }
  });

  // PIE
  charts.pie = new Chart(document.getElementById("pie"),{
    type:"pie",
    data:{
      labels:["Labour","Parts","Consumables"],
      datasets:[{
        data:[
          clean.reduce((a,b)=>a+b.labour,0),
          clean.reduce((a,b)=>a+b.parts,0),
          clean.reduce((a,b)=>a+b.cons,0)
        ]
      }]
    }
  });

})
.catch(err=>{
  console.error(err);
  alert("❌ Excel not loading. Check path.");
});

</script>

</body>
</html>
