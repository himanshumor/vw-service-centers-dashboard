<!DOCTYPE html>
<html>
<head>
<title>Kia Clavis Premium Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#0b2a36,#07151c);
color:white;
display:flex;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:rgba(10,20,30,0.9);
backdrop-filter: blur(12px);
padding:20px;
border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar img{
width:100%;
border-radius:12px;
margin-bottom:15px;
}

.sidebar h2{margin:5px 0;}
.sidebar p{opacity:.7;font-size:13px;}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.filters select{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:white;
padding:8px 10px;
border-radius:8px;
margin-right:10px;
}

/* KPI */
.kpi-row{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
}

.kpi{
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-radius:12px;
padding:15px;
text-align:center;
transition:0.3s;
}

.kpi:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
border-radius:14px;
padding:15px;
transition:0.3s;
}

.card:hover{
box-shadow:0 0 25px rgba(0,200,255,0.2);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}
td,th{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* INSIGHTS */
.insights{
background:rgba(255,255,255,0.05);
border-radius:14px;
padding:15px;
}

/* ANIMATION */
.fade-in{
animation:fade 0.8s ease;
}
@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar fade-in">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Kia_Carens_2022.jpg/640px-Kia_Carens_2022.jpg">

<h2>Kia Carens Clavis</h2>
<p>1.5 Diesel • Manual</p>
<p>7 Seater • 10 Years</p>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar fade-in">
<div class="filters">
<select><option>All Cities</option></select>
<select><option>1.5 Diesel</option></select>
<select><option>HTK+ 7 Seater</option></select>
</div>
<button onclick="location.reload()">Reset</button>
</div>

<h2 class="fade-in">Service Cost Intelligence</h2>

<!-- KPI -->
<div class="kpi-row fade-in">
<div class="kpi" id="total"></div>
<div class="kpi" id="avg"></div>
<div class="kpi" id="max"></div>
<div class="kpi" id="min"></div>
<div class="kpi" id="perkm"></div>
</div>

<!-- CHARTS -->
<div class="grid">
<div class="card fade-in">
<h3>Year-wise Cost</h3>
<canvas id="line"></canvas>
</div>

<div class="card fade-in">
<h3>Cost Breakdown</h3>
<canvas id="pie"></canvas>
</div>
</div>

<div class="grid">
<div class="card fade-in">
<h3>Category Cost</h3>
<canvas id="bar"></canvas>
</div>

<div class="insights fade-in" id="insights">
<h3>Insights</h3>
<p>Click on chart to explore service details</p>
</div>
</div>

<div class="card fade-in">
<h3>Service Table</h3>
<table id="table"></table>
</div>

</div>

<script>

let charts={};

function animateValue(el,start,end){
let i=start;
const step=(end-start)/20;
const interval=setInterval(()=>{
i+=step;
if(i>=end){i=end; clearInterval(interval);}
el.innerHTML="₹ "+Math.round(i);
},20);
}

fetch("clavis.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

const wb=XLSX.read(data,{type:"array"});
const sheet=wb.Sheets["Sheet2"];
const raw=XLSX.utils.sheet_to_json(sheet);

const clean=raw.map(r=>{
const keys=Object.keys(r);
const yearRaw=r[keys.find(k=>k.includes("INTERVAL")&&r[k]?.includes("YEAR"))];
const kmRaw=r[keys.find(k=>k.includes("INTERVAL")&&r[k]?.includes("KMS"))];

return{
year:parseInt(yearRaw),
km:parseInt(kmRaw),
cost:Number(r["GRAND TOTAL"]||0),
labour:Number(r["LABOUR CHARGES"]||0),
parts:Number(r["SPARE PARTS CHARGES"]||0),
cons:Number(r["CONSUMABLE CHARGES"]||0),
oil:Number(r["ENGINE OIL"]||0),
filter:Number(r["ENGINE OIL FILTER"]||0),
coolant:Number(r["COOLANT (ENGINE)"]||0),
brake:Number(r["BRAKE / CLUTCH FLUID"]||0)
};
}).filter(d=>d.year&&d.cost);

// GROUP
const map={};
clean.forEach(d=>map[d.year]=d);
const dataArr=Object.values(map).sort((a,b)=>a.year-b.year);

// KPI
const total=dataArr.reduce((a,b)=>a+b.cost,0);

animateValue(totalEl=total,total);
animateValue(avgEl=avg,Math.round(total/10));
animateValue(maxEl=max,Math.max(...dataArr.map(d=>d.cost)));
animateValue(minEl=min,Math.min(...dataArr.map(d=>d.cost)));
perkm.innerHTML="₹ "+(total/100000).toFixed(2)+"/km";

// LINE
charts.line=new Chart(line,{
type:'line',
data:{
labels:dataArr.map(d=>"Y"+d.year),
datasets:[{
data:dataArr.map(d=>d.cost),
borderColor:"#00c6ff",
tension:0.4
}]
},
options:{
animation:{duration:1500},
onClick:(e,el)=>{
if(el.length){
showDetails(dataArr[el[0].index]);
}
}
}
});

// PIE
charts.pie=new Chart(pie,{
type:'doughnut',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
],
backgroundColor:["#ff4d6d","#00c6ff","#ffaa00"]
}]
},
options:{animation:{duration:1500}}
});

// BAR
charts.bar=new Chart(bar,{
type:'bar',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
],
backgroundColor:["#ff4d6d","#00c6ff","#ffaa00"]
}]
},
options:{animation:{duration:1500}}
});

// TABLE
let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";
dataArr.forEach(d=>{
html+=`<tr><td>${d.year}</td><td>${d.km}</td><td>₹${d.cost}</td></tr>`;
});
table.innerHTML=html;

});

// DETAILS
function showDetails(d){
insights.innerHTML=`
<h3>🔧 Year ${d.year}</h3>
<p>Oil: ₹${d.oil}</p>
<p>Filter: ₹${d.filter}</p>
<p>Coolant: ₹${d.coolant}</p>
<p>Brake: ₹${d.brake}</p>
<p><b>Total ₹${d.cost}</b></p>
`;
}

</script>

</body>
</html>
