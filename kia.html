<!DOCTYPE html>
<html>
<head>
<title>Kia Clavis Enterprise Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: radial-gradient(circle at top,#0b2a36,#02080c);
color:#fff;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar img{
width:100%;
border-radius:12px;
}

.sidebar h2{margin:10px 0 0;}
.sidebar p{opacity:.6;margin:0;font-size:13px}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* KPI */
.kpi-row{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-bottom:20px;
}

.kpi{
background:linear-gradient(135deg,#1c3b47,#132a35);
padding:16px;
border-radius:14px;
text-align:center;
box-shadow:0 0 20px rgba(0,255,255,0.05);
transition:0.3s;
}

.kpi:hover{
transform:translateY(-4px);
box-shadow:0 0 25px rgba(0,255,255,0.2);
}

.kpi h3{margin:5px 0;font-size:20px}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:16px;
margin-bottom:16px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
padding:16px;
border-radius:16px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* INSIGHTS */
.insight{
background:rgba(0,255,255,0.08);
padding:10px;
border-radius:10px;
margin-top:8px;
}

/* TITLE */
h2{
margin-bottom:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<img src="https://imgd.aeplcdn.com/600x337/n/cw/ec/131825/carens-exterior-right-front-three-quarter-2.jpeg">

<h2>Kia Carens Clavis</h2>
<p>1.5 Diesel • Manual</p>
<p>7 Seater • 10 Years</p>

</div>

<!-- MAIN -->
<div class="main">

<h2>🚀 Service Cost Intelligence</h2>

<!-- KPI -->
<div class="kpi-row">
<div class="kpi"><small>Total</small><h3 id="total"></h3></div>
<div class="kpi"><small>Average</small><h3 id="avg"></h3></div>
<div class="kpi"><small>Max</small><h3 id="max"></h3></div>
<div class="kpi"><small>Min</small><h3 id="min"></h3></div>
<div class="kpi"><small>₹/KM</small><h3 id="perkm"></h3></div>
</div>

<!-- ROW 1 -->
<div class="grid">

<div class="card">
<h3>Year-wise Trend</h3>
<canvas id="line"></canvas>
</div>

<div class="card">
<h3>Cost Breakdown</h3>
<canvas id="pie"></canvas>
</div>

</div>

<!-- ROW 2 -->
<div class="grid">

<div class="card">
<h3>Category Cost</h3>
<canvas id="bar"></canvas>
</div>

<div class="card">
<h3>Service Details</h3>
<div id="details">Click a year</div>
</div>

</div>

<!-- TABLE -->
<div class="card">
<h3>Service Table</h3>
<table id="table"></table>
</div>

</div>

<script>

let charts={};

fetch("clavis.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

const wb=XLSX.read(data,{type:"array"});
const sheet=wb.Sheets["Sheet2"];
const raw=XLSX.utils.sheet_to_json(sheet);

// 🔥 SMART PARSE (handles messy columns)
const parsed = raw.map(r=>{

const keys=Object.keys(r);

const yearKey = keys.find(k=>k.includes("YEAR"));
const kmKey = keys.find(k=>k.includes("KMS"));

return{
year:parseInt(r[yearKey]),
km:parseInt(r[kmKey]),
cost:Number(r["GRAND TOTAL"]||0),
labour:Number(r["LABOUR CHARGES"]||0),
parts:Number(r["SPARE PARTS CHARGES"]||0),
cons:Number(r["CONSUMABLE CHARGES"]||0),
oil:Number(r["ENGINE OIL"]||0),
filter:Number(r["ENGINE OIL FILTER"]||0),
coolant:Number(r["COOLANT (ENGINE)"]||0),
brake:Number(r["BRAKE / CLUTCH FLUID"]||0)
};

}).filter(d=>d.year && d.cost);

// UNIQUE YEARS
const map={};
parsed.forEach(d=>map[d.year]=d);
const dataArr=Object.values(map).sort((a,b)=>a.year-b.year);

// KPI
const total=dataArr.reduce((a,b)=>a+b.cost,0);
totalDiv.innerText="₹ "+total;
avgDiv.innerText="₹ "+Math.round(total/10);
maxDiv.innerText="₹ "+Math.max(...dataArr.map(d=>d.cost));
minDiv.innerText="₹ "+Math.min(...dataArr.map(d=>d.cost));
perkmDiv.innerText="₹ "+(total/100000).toFixed(2);

// LINE
charts.line=new Chart(line,{
type:'line',
data:{
labels:dataArr.map(d=>"Y"+d.year),
datasets:[{
data:dataArr.map(d=>d.cost),
borderColor:"#00e5ff",
backgroundColor:"rgba(0,229,255,0.2)",
fill:true,
tension:.4
}]
},
options:{
plugins:{legend:{display:false}},
onClick:(e,el)=>{
if(el.length){
show(dataArr[el[0].index]);
}
}
}
});

// PIE
charts.pie=new Chart(pie,{
type:'doughnut',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// BAR
charts.bar=new Chart(bar,{
type:'bar',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// TABLE
let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";
dataArr.forEach(d=>{
html+=`<tr><td>${d.year}</td><td>${d.km}</td><td>₹${d.cost}</td></tr>`;
});
table.innerHTML=html;

});

// DETAILS
function show(d){
details.innerHTML=`
<div class="insight">🛢 Engine Oil: ₹${d.oil}</div>
<div class="insight">🔧 Oil Filter: ₹${d.filter}</div>
<div class="insight">❄ Coolant: ₹${d.coolant}</div>
<div class="insight">🛑 Brake Fluid: ₹${d.brake}</div>
<div class="insight"><b>Total: ₹${d.cost}</b></div>
`;
}

</script>

</body>
</html>
