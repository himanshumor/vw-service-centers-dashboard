<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kia Carens Clavis Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI";
  background: linear-gradient(135deg, #0f2027, #203a43);
  color: white;
}

.container {
  padding: 20px;
}

h1 {
  text-align: center;
}

.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

.card {
  background: #1e3c47;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #555;
}

th {
  background: #2c5364;
}

button {
  margin-bottom: 15px;
  padding: 10px;
  border: none;
  background: #00c6ff;
  color: black;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<button onclick="goHome()">⬅ Home</button>

<h1>🚙 Kia Carens Clavis Service Intelligence</h1>

<div class="filters">
  <select id="city"></select>
  <select id="engine"></select>
  <select id="variant"></select>
</div>

<div class="card">
  <h3>📊 Service Cost Trend</h3>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>📋 Service Breakdown</h3>
  <table id="table"></table>
</div>

</div>

<script>

let rawData = [];
let chart;

// 🚀 LOAD EXCEL FROM REPO
fetch("clavis.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

  const workbook = XLSX.read(data, {type:"array"});
  const sheet = workbook.Sheets["Sheet2"];

  let raw = XLSX.utils.sheet_to_json(sheet);

  // 🔥 CLEAN & NORMALIZE DATA
  rawData = raw.map(r => ({
    city: r["CITY"],
    engine: r["ENGINE"],
    variant: (r["   VARIANT"] || "").trim(),
    year: parseInt(r["INTERVAL"]),
    km: r["INTERVAL"],
    cost: r["GRAND TOTAL"]
  }));

  initFilters();
  updateDashboard();
});

// 🎛️ FILTERS
function initFilters(){
  fill("city", "city");
  fill("engine", "engine");
  fill("variant", "variant");
}

function fill(id, key){
  const values = [...new Set(rawData.map(d => d[key]).filter(Boolean))];
  const el = document.getElementById(id);

  el.innerHTML = `<option value="all">All ${key}</option>`;
  values.forEach(v=>{
    el.innerHTML += `<option value="${v}">${v}</option>`;
  });

  el.onchange = updateDashboard;
}

// 🔍 FILTER LOGIC
function getFiltered(){
  const city = document.getElementById("city").value;
  const engine = document.getElementById("engine").value;
  const variant = document.getElementById("variant").value;

  return rawData.filter(d =>
    (city==="all" || d.city===city) &&
    (engine==="all" || d.engine===engine) &&
    (variant==="all" || d.variant===variant)
  );
}

// 📊 UPDATE DASHBOARD
function updateDashboard(){

  let data = getFiltered();

  // Sort by year
  data.sort((a,b)=> a.year - b.year);

  const labels = data.map(d => "Year " + d.year);
  const values = data.map(d => d.cost);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:'line',
    data:{
      labels: labels,
      datasets:[{
        label:"Service Cost (₹)",
        data: values,
        borderWidth:2,
        tension: 0.3
      }]
    }
  });

  // TABLE
  let html = `
    <tr>
      <th>Year</th>
      <th>KM</th>
      <th>Total Cost</th>
    </tr>
  `;

  data.forEach(d=>{
    html += `
      <tr>
        <td>${d.year}</td>
        <td>${d.km}</td>
        <td>₹${d.cost}</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
}

// 🧭 NAVIGATION
function goHome(){
  window.location.href="index.html";
}

</script>

</body>
</html>
