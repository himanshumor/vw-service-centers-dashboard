<!DOCTYPE html>
<html>
<head>
<title>Kia Clavis Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#07151c,#0b2a36);
color:white;
display:flex;
}

/* FIX: remove overflow hidden */
.main{
flex:1;
padding:20px;
overflow-y:auto;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:#061219;
padding:20px;
}

/* FIXED IMAGE */
.sidebar img{
width:100%;
border-radius:10px;
}

/* KPI */
.kpi-row{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-top:10px;
}

.kpi{
background:#132a35;
padding:12px;
border-radius:10px;
text-align:center;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:#132a35;
padding:15px;
border-radius:12px;
}

table{
width:100%;
margin-top:10px;
}
td,th{
padding:6px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div class="sidebar">

<img src="https://imgd.aeplcdn.com/600x337/n/cw/ec/131825/carens-exterior-right-front-three-quarter-2.jpeg">

<h2>Kia Carens Clavis</h2>
<p>1.5 Diesel • Manual</p>
<p>7 Seater • 10 Years</p>

</div>

<div class="main">

<h2>Service Cost Intelligence</h2>

<div class="kpi-row">
<div class="kpi" id="total"></div>
<div class="kpi" id="avg"></div>
<div class="kpi" id="max"></div>
<div class="kpi" id="min"></div>
<div class="kpi" id="perkm"></div>
</div>

<div class="grid">
<div class="card">
<h3>Year-wise Cost</h3>
<canvas id="line"></canvas>
</div>

<div class="card">
<h3>Cost Breakdown</h3>
<canvas id="pie"></canvas>
</div>
</div>

<div class="grid">
<div class="card">
<h3>Category Cost</h3>
<canvas id="bar"></canvas>
</div>

<div class="card" id="insights">
<h3>Insights</h3>
<p>Click on chart</p>
</div>
</div>

<div class="card">
<h3>Service Table</h3>
<table id="table"></table>
</div>

</div>

<script>

let charts={};

function animate(el,val){
let i=0;
const step=val/20;
const int=setInterval(()=>{
i+=step;
if(i>=val){i=val;clearInterval(int);}
el.innerHTML="₹ "+Math.round(i);
},30);
}

fetch("clavis.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

const wb=XLSX.read(data,{type:"array"});
const sheet=wb.Sheets["Sheet2"];
const raw=XLSX.utils.sheet_to_json(sheet);

// FIX PARSING
const clean=raw.map(r=>{

const keys=Object.keys(r);

const yearKey = keys.find(k=>k.includes("INTERVAL") && String(r[k]).includes("YEAR"));
const kmKey   = keys.find(k=>k.includes("INTERVAL") && String(r[k]).includes("KMS"));

return{
year:parseInt(r[yearKey]),
km:parseInt(r[kmKey]),

cost:Number(r["GRAND TOTAL"]||0),
labour:Number(r["LABOUR CHARGES"]||0),
parts:Number(r["SPARE PARTS CHARGES"]||0),
cons:Number(r["CONSUMABLE CHARGES"]||0),

oil:Number(r["ENGINE OIL"]||0),
filter:Number(r["ENGINE OIL FILTER"]||0),
coolant:Number(r["COOLANT (ENGINE)"]||0),
brake:Number(r["BRAKE / CLUTCH FLUID"]||0)
};

}).filter(d=>d.year && d.cost);

if(clean.length===0){
alert("❌ Data parsing failed. Check column names.");
return;
}

// GROUP
const map={};
clean.forEach(d=>map[d.year]=d);
const dataArr=Object.values(map).sort((a,b)=>a.year-b.year);

// KPI
const totalVal=dataArr.reduce((a,b)=>a+b.cost,0);

animate(document.getElementById("total"),totalVal);
animate(document.getElementById("avg"),Math.round(totalVal/10));
animate(document.getElementById("max"),Math.max(...dataArr.map(d=>d.cost)));
animate(document.getElementById("min"),Math.min(...dataArr.map(d=>d.cost)));
document.getElementById("perkm").innerHTML="₹ "+(totalVal/100000).toFixed(2)+"/km";

// LINE
charts.line=new Chart(line,{
type:'line',
data:{
labels:dataArr.map(d=>"Y"+d.year),
datasets:[{
data:dataArr.map(d=>d.cost),
borderColor:"#00c6ff",
tension:0.4
}]
},
options:{
onClick:(e,el)=>{
if(el.length){
showDetails(dataArr[el[0].index]);
}
}
}
});

// PIE
charts.pie=new Chart(pie,{
type:'doughnut',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// BAR
charts.bar=new Chart(bar,{
type:'bar',
data:{
labels:["Parts","Labour","Consumables"],
datasets:[{
data:[
dataArr.reduce((a,b)=>a+b.parts,0),
dataArr.reduce((a,b)=>a+b.labour,0),
dataArr.reduce((a,b)=>a+b.cons,0)
]
}]
}
});

// TABLE
let html="<tr><th>Year</th><th>KM</th><th>Cost</th></tr>";
dataArr.forEach(d=>{
html+=`<tr><td>${d.year}</td><td>${d.km}</td><td>₹${d.cost}</td></tr>`;
});
table.innerHTML=html;

});

// DETAILS
function showDetails(d){
document.getElementById("insights").innerHTML=`
<h3>Year ${d.year}</h3>
<p>Oil ₹${d.oil}</p>
<p>Filter ₹${d.filter}</p>
<p>Coolant ₹${d.coolant}</p>
<p>Brake ₹${d.brake}</p>
<p><b>Total ₹${d.cost}</b></p>
`;
}

</script>

</body>
</html>
